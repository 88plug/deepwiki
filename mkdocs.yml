site_name: DeepWiki
site_description: Read any public GitHub repo's auto-generated documentation from inside Claude Code — no cloning, no API key.
site_url: https://88plug.github.io/deepwiki/
repo_url: https://github.com/88plug/deepwiki
repo_name: 88plug/deepwiki
edit_uri: edit/main/docs/
use_directory_urls: true

theme:
  name: material
  features:
    - navigation.sections   # group nav by section, uses width well
    - navigation.top        # back-to-top button
    - navigation.instant    # SPA-style fast page loads
    - content.code.copy     # copy button on code blocks (needs superfences below)
    - search.suggest
  palette:
    # Light/dark toggle that follows the OS preference by default.
    - media: "(prefers-color-scheme: light)"
      scheme: default
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - def_list
  - footnotes
  - tables
  - pymdownx.highlight     # code highlighting (ships with mkdocs-material)
  - pymdownx.superfences   # required for content.code.copy + nested fences
  - pymdownx.details       # collapsible <details> admonitions
  - toc:
      permalink: true
